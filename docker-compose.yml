version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      [
        "redpanda",
        "start",
        "--overprovisioned",
        "--smp",
        "1",
        "--memory",
        "1G",
        "--reserve-memory",
        "0M",
        "--check=false",
        "--node-id",
        "0",
        "--kafka-addr",
        "PLAINTEXT://0.0.0.0:9092",
        "--advertise-kafka-addr",
        "PLAINTEXT://redpanda:9092"
      ]
    ports:
      - "${REDPANDA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=redpanda:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "mc alias set local http://minio:9000 ${OBJECT_STORE_ACCESS_KEY_ID:-minioadmin} ${OBJECT_STORE_SECRET_ACCESS_KEY:-minioadmin} && mc mb -p local/${OBJECT_STORE_BUCKET:-platform-lake} || true"
      ]
    profiles: ["demo", "live"]

  control-api:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.control_api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    environment:
      CONTROL_API_DATABASE_URL: ${CONTROL_API_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_platform}
      CONTROL_API_KEY: ${CONTROL_API_KEY:-}
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      PLATFORM_DATA_ROOT: ${PLATFORM_DATA_ROOT:-/app/data/lake}
      DUCKDB_PATH: ${DUCKDB_PATH:-/app/data/platform.duckdb}
      HOT_CACHE_ROOT: ${HOT_CACHE_ROOT:-/app/data/hot-cache}
      OBJECT_STORE_BACKEND: ${OBJECT_STORE_BACKEND:-s3}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-platform-lake}
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-http://minio:9000}
      OBJECT_STORE_REGION: ${OBJECT_STORE_REGION:-us-east-1}
      OBJECT_STORE_ACCESS_KEY_ID: ${OBJECT_STORE_ACCESS_KEY_ID:-minioadmin}
      OBJECT_STORE_SECRET_ACCESS_KEY: ${OBJECT_STORE_SECRET_ACCESS_KEY:-minioadmin}
      OBJECT_STORE_PREFIX: ${OBJECT_STORE_PREFIX:-}
      CHECKPOINT_ROOT: ${CHECKPOINT_ROOT:-/app/data/checkpoints}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redpanda}
      REDPANDA_BROKERS: ${REDPANDA_BROKERS:-redpanda:9092}
      REDPANDA_TOPIC_PREFIX: ${REDPANDA_TOPIC_PREFIX:-okx-platform}
      COMPACTION_INTERVAL_SECONDS: ${COMPACTION_INTERVAL_SECONDS:-3600}
      ARTIFACT_RETENTION_DAYS: ${ARTIFACT_RETENTION_DAYS:-90}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "${CONTROL_API_PORT:-8000}:8000"
    profiles: ["demo", "live"]

  market-data-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.market_data:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8101"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      PLATFORM_DATA_ROOT: ${PLATFORM_DATA_ROOT:-/app/data/lake}
      DUCKDB_PATH: ${DUCKDB_PATH:-/app/data/platform.duckdb}
      HOT_CACHE_ROOT: ${HOT_CACHE_ROOT:-/app/data/hot-cache}
      OBJECT_STORE_BACKEND: ${OBJECT_STORE_BACKEND:-s3}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-platform-lake}
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-http://minio:9000}
      OBJECT_STORE_REGION: ${OBJECT_STORE_REGION:-us-east-1}
      OBJECT_STORE_ACCESS_KEY_ID: ${OBJECT_STORE_ACCESS_KEY_ID:-minioadmin}
      OBJECT_STORE_SECRET_ACCESS_KEY: ${OBJECT_STORE_SECRET_ACCESS_KEY:-minioadmin}
      OBJECT_STORE_PREFIX: ${OBJECT_STORE_PREFIX:-}
      CHECKPOINT_ROOT: ${CHECKPOINT_ROOT:-/app/data/checkpoints}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redpanda}
      REDPANDA_BROKERS: ${REDPANDA_BROKERS:-redpanda:9092}
      REDPANDA_TOPIC_PREFIX: ${REDPANDA_TOPIC_PREFIX:-okx-platform}
      COMPACTION_INTERVAL_SECONDS: ${COMPACTION_INTERVAL_SECONDS:-3600}
      ARTIFACT_RETENTION_DAYS: ${ARTIFACT_RETENTION_DAYS:-90}
      ENABLE_MARKET_DATA_WORKER: ${ENABLE_MARKET_DATA_WORKER:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OKX_UNIVERSE_SOURCE: ${OKX_UNIVERSE_SOURCE:-control_plane}
      OKX_PUBLIC_INSTRUMENT_KINDS: ${OKX_PUBLIC_INSTRUMENT_KINDS:-spot,swap}
      OKX_INST_ID_WHITELIST: ${OKX_INST_ID_WHITELIST:-}
      OKX_TIER_A_INST_IDS: ${OKX_TIER_A_INST_IDS:-BTC-USDT-SWAP}
      OKX_TIER_B_INST_IDS: ${OKX_TIER_B_INST_IDS:-}
      OKX_PUBLIC_WS_BATCH_SIZE: ${OKX_PUBLIC_WS_BATCH_SIZE:-50}
      OKX_INSTRUMENT_REFRESH_SECONDS: ${OKX_INSTRUMENT_REFRESH_SECONDS:-21600}
      OKX_ACCOUNT_POLL_SECONDS: ${OKX_ACCOUNT_POLL_SECONDS:-30}
      OKX_FILL_POLL_SECONDS: ${OKX_FILL_POLL_SECONDS:-10}
      OKX_FEE_POLL_SECONDS: ${OKX_FEE_POLL_SECONDS:-900}
      OKX_FUNDING_POLL_SECONDS: ${OKX_FUNDING_POLL_SECONDS:-600}
      OKX_TRADE_FLUSH_INTERVAL_SECONDS: ${OKX_TRADE_FLUSH_INTERVAL_SECONDS:-1}
      OKX_BOOK_SAMPLING_INTERVAL_MS: ${OKX_BOOK_SAMPLING_INTERVAL_MS:-1000}
      OKX_REST_PUBLIC_LIMIT_PER_2S: ${OKX_REST_PUBLIC_LIMIT_PER_2S:-10}
      OKX_REST_PRIVATE_LIMIT_PER_2S: ${OKX_REST_PRIVATE_LIMIT_PER_2S:-5}
      OKX_REST_BACKFILL_LIMIT_PER_2S: ${OKX_REST_BACKFILL_LIMIT_PER_2S:-2}
      OKX_WS_RAW_TTL_DAYS: ${OKX_WS_RAW_TTL_DAYS:-3}
      OKX_BOOK_DELTA_TTL_DAYS: ${OKX_BOOK_DELTA_TTL_DAYS:-2}
      OKX_DEMO_API_KEY: ${OKX_DEMO_API_KEY:-}
      OKX_DEMO_SECRET_KEY: ${OKX_DEMO_SECRET_KEY:-}
      OKX_DEMO_PASSPHRASE: ${OKX_DEMO_PASSPHRASE:-}
      OKX_LIVE_API_KEY: ${OKX_LIVE_API_KEY:-}
      OKX_LIVE_SECRET_KEY: ${OKX_LIVE_SECRET_KEY:-}
      OKX_LIVE_PASSPHRASE: ${OKX_LIVE_PASSPHRASE:-}
    depends_on:
      control-api:
        condition: service_started
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "${MARKET_DATA_PORT:-8101}:8101"
    profiles: ["demo", "live"]

  model-inference-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.model_inference:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8102"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      BASELINE_STRATEGY_ID: ${BASELINE_STRATEGY_ID:-reference-breakout}
      BASELINE_MODEL_VERSION_ID: ${BASELINE_MODEL_VERSION_ID:-reference-breakout-baseline-v1}
      BASELINE_INST_ID: ${BASELINE_INST_ID:-BTC-USDT-SWAP}
      BASELINE_INSTRUMENT_KIND: ${BASELINE_INSTRUMENT_KIND:-swap}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      market-data-service:
        condition: service_started
    ports:
      - "${MODEL_INFERENCE_PORT:-8102}:8102"
    profiles: ["demo", "live"]

  portfolio-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.portfolio:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8103"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      model-inference-service:
        condition: service_started
    ports:
      - "${PORTFOLIO_PORT:-8103}:8103"
    profiles: ["demo", "live"]

  execution-policy-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.execution_policy:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8104"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      portfolio-service:
        condition: service_started
      risk-service:
        condition: service_started
    ports:
      - "${EXECUTION_POLICY_PORT:-8104}:8104"
    profiles: ["demo", "live"]

  execution-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.execution:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8105"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OKX_DEMO_API_KEY: ${OKX_DEMO_API_KEY:-}
      OKX_DEMO_SECRET_KEY: ${OKX_DEMO_SECRET_KEY:-}
      OKX_DEMO_PASSPHRASE: ${OKX_DEMO_PASSPHRASE:-}
      OKX_LIVE_API_KEY: ${OKX_LIVE_API_KEY:-}
      OKX_LIVE_SECRET_KEY: ${OKX_LIVE_SECRET_KEY:-}
      OKX_LIVE_PASSPHRASE: ${OKX_LIVE_PASSPHRASE:-}
    depends_on:
      control-api:
        condition: service_started
      execution-policy-service:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "${EXECUTION_PORT:-8105}:8105"
    profiles: ["demo", "live"]

  replay-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.replay:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8106"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      PLATFORM_DATA_ROOT: ${PLATFORM_DATA_ROOT:-/app/data/lake}
      DUCKDB_PATH: ${DUCKDB_PATH:-/app/data/platform.duckdb}
      HOT_CACHE_ROOT: ${HOT_CACHE_ROOT:-/app/data/hot-cache}
      OBJECT_STORE_BACKEND: ${OBJECT_STORE_BACKEND:-s3}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-platform-lake}
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-http://minio:9000}
      OBJECT_STORE_REGION: ${OBJECT_STORE_REGION:-us-east-1}
      OBJECT_STORE_ACCESS_KEY_ID: ${OBJECT_STORE_ACCESS_KEY_ID:-minioadmin}
      OBJECT_STORE_SECRET_ACCESS_KEY: ${OBJECT_STORE_SECRET_ACCESS_KEY:-minioadmin}
      OBJECT_STORE_PREFIX: ${OBJECT_STORE_PREFIX:-}
      CHECKPOINT_ROOT: ${CHECKPOINT_ROOT:-/app/data/checkpoints}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-redpanda}
      REDPANDA_BROKERS: ${REDPANDA_BROKERS:-redpanda:9092}
      REDPANDA_TOPIC_PREFIX: ${REDPANDA_TOPIC_PREFIX:-okx-platform}
      COMPACTION_INTERVAL_SECONDS: ${COMPACTION_INTERVAL_SECONDS:-3600}
      ARTIFACT_RETENTION_DAYS: ${ARTIFACT_RETENTION_DAYS:-90}
      ENABLE_REPLAY_WORKER: ${ENABLE_REPLAY_WORKER:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      market-data-service:
        condition: service_started
      redpanda:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "${REPLAY_PORT:-8106}:8106"
    profiles: ["demo", "live"]

  risk-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.risk:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8107"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "${RISK_PORT:-8107}:8107"
    profiles: ["demo", "live"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
