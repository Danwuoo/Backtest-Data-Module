version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-api:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.control_api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    environment:
      CONTROL_API_DATABASE_URL: ${CONTROL_API_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/trading_platform}
      CONTROL_API_KEY: ${CONTROL_API_KEY:-}
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      PLATFORM_DATA_ROOT: ${PLATFORM_DATA_ROOT:-/app/data/lake}
      DUCKDB_PATH: ${DUCKDB_PATH:-/app/data/platform.duckdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CONTROL_API_PORT:-8000}:8000"
    profiles: ["demo", "live"]

  market-data-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.market_data:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8101"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      PLATFORM_DATA_ROOT: ${PLATFORM_DATA_ROOT:-/app/data/lake}
      DUCKDB_PATH: ${DUCKDB_PATH:-/app/data/platform.duckdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OKX_UNIVERSE_SOURCE: ${OKX_UNIVERSE_SOURCE:-control_plane}
      OKX_PUBLIC_INSTRUMENT_KINDS: ${OKX_PUBLIC_INSTRUMENT_KINDS:-spot,swap}
      OKX_INST_ID_WHITELIST: ${OKX_INST_ID_WHITELIST:-}
      OKX_TIER_A_INST_IDS: ${OKX_TIER_A_INST_IDS:-BTC-USDT-SWAP}
      OKX_TIER_B_INST_IDS: ${OKX_TIER_B_INST_IDS:-}
      OKX_PUBLIC_WS_BATCH_SIZE: ${OKX_PUBLIC_WS_BATCH_SIZE:-50}
      OKX_INSTRUMENT_REFRESH_SECONDS: ${OKX_INSTRUMENT_REFRESH_SECONDS:-21600}
      OKX_ACCOUNT_POLL_SECONDS: ${OKX_ACCOUNT_POLL_SECONDS:-30}
      OKX_FILL_POLL_SECONDS: ${OKX_FILL_POLL_SECONDS:-10}
      OKX_FEE_POLL_SECONDS: ${OKX_FEE_POLL_SECONDS:-900}
      OKX_FUNDING_POLL_SECONDS: ${OKX_FUNDING_POLL_SECONDS:-600}
      OKX_TRADE_FLUSH_INTERVAL_SECONDS: ${OKX_TRADE_FLUSH_INTERVAL_SECONDS:-1}
      OKX_BOOK_SAMPLING_INTERVAL_MS: ${OKX_BOOK_SAMPLING_INTERVAL_MS:-1000}
      OKX_REST_PUBLIC_LIMIT_PER_2S: ${OKX_REST_PUBLIC_LIMIT_PER_2S:-10}
      OKX_REST_PRIVATE_LIMIT_PER_2S: ${OKX_REST_PRIVATE_LIMIT_PER_2S:-5}
      OKX_REST_BACKFILL_LIMIT_PER_2S: ${OKX_REST_BACKFILL_LIMIT_PER_2S:-2}
      OKX_WS_RAW_TTL_DAYS: ${OKX_WS_RAW_TTL_DAYS:-3}
      OKX_BOOK_DELTA_TTL_DAYS: ${OKX_BOOK_DELTA_TTL_DAYS:-2}
      OKX_DEMO_API_KEY: ${OKX_DEMO_API_KEY:-}
      OKX_DEMO_SECRET_KEY: ${OKX_DEMO_SECRET_KEY:-}
      OKX_DEMO_PASSPHRASE: ${OKX_DEMO_PASSPHRASE:-}
      OKX_LIVE_API_KEY: ${OKX_LIVE_API_KEY:-}
      OKX_LIVE_SECRET_KEY: ${OKX_LIVE_SECRET_KEY:-}
      OKX_LIVE_PASSPHRASE: ${OKX_LIVE_PASSPHRASE:-}
    depends_on:
      control-api:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "${MARKET_DATA_PORT:-8101}:8101"
    profiles: ["demo", "live"]

  model-inference-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.model_inference:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8102"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      BASELINE_STRATEGY_ID: ${BASELINE_STRATEGY_ID:-reference-breakout}
      BASELINE_MODEL_VERSION_ID: ${BASELINE_MODEL_VERSION_ID:-reference-breakout-baseline-v1}
      BASELINE_INST_ID: ${BASELINE_INST_ID:-BTC-USDT-SWAP}
      BASELINE_INSTRUMENT_KIND: ${BASELINE_INSTRUMENT_KIND:-swap}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      market-data-service:
        condition: service_started
    ports:
      - "${MODEL_INFERENCE_PORT:-8102}:8102"
    profiles: ["demo", "live"]

  portfolio-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.portfolio:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8103"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      model-inference-service:
        condition: service_started
    ports:
      - "${PORTFOLIO_PORT:-8103}:8103"
    profiles: ["demo", "live"]

  execution-policy-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.execution_policy:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8104"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      portfolio-service:
        condition: service_started
      risk-service:
        condition: service_started
    ports:
      - "${EXECUTION_POLICY_PORT:-8104}:8104"
    profiles: ["demo", "live"]

  execution-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.execution:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8105"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OKX_DEMO_API_KEY: ${OKX_DEMO_API_KEY:-}
      OKX_DEMO_SECRET_KEY: ${OKX_DEMO_SECRET_KEY:-}
      OKX_DEMO_PASSPHRASE: ${OKX_DEMO_PASSPHRASE:-}
      OKX_LIVE_API_KEY: ${OKX_LIVE_API_KEY:-}
      OKX_LIVE_SECRET_KEY: ${OKX_LIVE_SECRET_KEY:-}
      OKX_LIVE_PASSPHRASE: ${OKX_LIVE_PASSPHRASE:-}
    depends_on:
      control-api:
        condition: service_started
      execution-policy-service:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "${EXECUTION_PORT:-8105}:8105"
    profiles: ["demo", "live"]

  replay-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.replay:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8106"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      PLATFORM_DATA_ROOT: ${PLATFORM_DATA_ROOT:-/app/data/lake}
      DUCKDB_PATH: ${DUCKDB_PATH:-/app/data/platform.duckdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      market-data-service:
        condition: service_started
    ports:
      - "${REPLAY_PORT:-8106}:8106"
    profiles: ["demo", "live"]

  risk-service:
    build: .
    command:
      [
        "uvicorn",
        "okx_trading_platform.services.risk:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8107"
      ]
    environment:
      TRADING_PROFILE: ${TRADING_PROFILE:-demo}
      BASELINE_PROFILE_ID: ${BASELINE_PROFILE_ID:-demo-main}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      control-api:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "${RISK_PORT:-8107}:8107"
    profiles: ["demo", "live"]

volumes:
  postgres_data:
  redis_data:
